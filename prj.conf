################################################################################
# Application configuration
CONFIG_GPIO=y

# Enable c++ support
CONFIG_CPP=y
CONFIG_STD_CPP11=y
CONFIG_GLIBCXX_LIBCPP=y
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y
CONFIG_NEWLIB_LIBC_NANO=n

#CONFIG_NRF_AXON_ML_SOURCE_INTERNAL_FULL=n
CONFIG_NRF_AXON=y

CONFIG_NRF_AXON_INTERLAYER_BUFFER_SIZE=120000

# set to 0 for models that don't use psum buffer
CONFIG_NRF_AXON_PSUM_BUFFER_SIZE=0

# Enable reboot from user space
CONFIG_REBOOT=y

# Enable floating point unit
CONFIG_FPU=y

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_EI_INFERENCE_THREAD_STACK=4096
CONFIG_HEAP_MEM_POOL_SIZE=100000

# Serial console
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_CONSOLE_SUBSYS=n

CONFIG_DK_LIBRARY=n
# Using built-in sensor
CONFIG_SENSOR=y

# I2C configuration for accelerometer
CONFIG_I2C=y
CONFIG_I2C_NRFX=y

CONFIG_ASSERT=y
CONFIG_DEBUG=y
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_UART=n

# Configure Segger RTT
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096

# Configure bluetooth
CONFIG_BT=y

CONFIG_SETTINGS=y
CONFIG_CJSON_LIB=y

